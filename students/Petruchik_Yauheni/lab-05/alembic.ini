[alembic]
script_location = infrastructure/migrations
sqlalchemy.url = postgresql://postgres:postgres@db:5432/budgetdb

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)s: %(name)s: %(message)s
