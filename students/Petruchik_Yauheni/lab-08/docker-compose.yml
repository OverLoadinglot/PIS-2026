version: '3.9'
services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  budget_service:
    build: ./services/budget_service
    depends_on:
      - rabbitmq
    environment:
      - RABBITMQ_HOST=rabbitmq

  report_service:
    build: ./services/report_service
    depends_on:
      - rabbitmq
    environment:
      - RABBITMQ_HOST=rabbitmq

  notification_service:
    build: ./services/notification_service
    depends_on:
      - rabbitmq
    environment:
      - RABBITMQ_HOST=rabbitmq

  api_gateway:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - budget_service
      - report_service
      - notification_service
